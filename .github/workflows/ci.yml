name: CI

on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # CI 체크 1: 컴파일
      - name: 빌드 (테스트 제외)
        run: ./gradlew build -x test --no-daemon

      # CI 체크 2: 스타일 검사
      - name: Checkstyle
        run: ./gradlew checkstyleMain --no-daemon

      # CI 체크 3: 전체 테스트 (ArchUnit 포함)
      - name: 테스트
        run: ./gradlew test --no-daemon
        env:
          # 테스트용 인메모리 DB 사용 시 여기에 환경변수 추가
          SPRING_PROFILES_ACTIVE: test

      # CI 체크 4: 테스트 결과 업로드 (실패 시 확인용)
      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: build/reports/tests/

# CI 체크 5항목 (현재 4개 자동화, 1개는 PR 템플릿으로 사람이 확인):
# 1. ✅ 컴파일 통과 (gradlew build -x test)
# 2. ✅ Checkstyle 통과 (gradlew checkstyleMain)
# 3. ✅ 테스트 통과 - ArchUnit 의존성 규칙 포함 (gradlew test)
# 4. ✅ 테스트 결과 아티팩트 보존
# 5. 👤 보안/비밀키 하드코딩 — PR 템플릿 리뷰어 체크리스트로 강제
